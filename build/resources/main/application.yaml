server:
  port: 8080

spring:
  application:
    name: ibm-mq-monitoring

  jms:
    listener:
      acknowledge-mode: auto
      concurrency: 1
      max-concurrency: 20

ibm:
  mq:
    queueManager: QM1
    channel: DEV.APP.SVRCONN
    connName: localhost(1414)
    user: app
    password: passw0rd

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
      access: unrestricted
